name: win32_websocket
description: A Dart WebSocket library using Windows WinHTTP API, compatible with package:web_socket.
version: 0.0.1
repository: https://github.com/Win32WebSocket/win32_websocket

environment:
  sdk: ^3.0.0

dependencies:
  ffi: ^2.1.2
  web_socket: ^1.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  shelf_web_socket: ^2.0.0
  shelf: ^1.4.0
  web_socket_channel: ^2.4.0
